<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Codey</title>
    <script>
      (function () {
        try {
          var m = localStorage.getItem('codey.theme');
          if (m !== 'light' && m !== 'dark' && m !== 'system') m = 'system';
          var eff = m === 'system'
            ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
            : m;
          document.documentElement.dataset.theme = eff;
          // Color theme (palette), independent of light/dark.
          var p = localStorage.getItem('codey.palette');
          if (p !== 'classic' && p !== 'terminal') p = 'classic';
          document.documentElement.dataset.palette = p;
          // Match the active palette's vars so the first paint isn't white-on-white.
          var bg, fg;
          if (p === 'terminal') {
            bg = eff === 'light' ? '#FBF8F1' : '#141310';
            fg = eff === 'light' ? '#1A1712' : '#F4EFE5';
          } else {
            bg = eff === 'light' ? '#ffffff' : '#141414';
            fg = eff === 'light' ? '#1d1d1f' : '#f0f0f0';
          }
          document.documentElement.style.background = bg;
          document.documentElement.style.color = fg;
        } catch (e) {}
      })();
    </script>
    <style>
      body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
      .hljs-comment, .hljs-quote { color: var(--fg3); font-style: italic; }
      .hljs-keyword, .hljs-selector-tag, .hljs-section, .hljs-link { color: var(--accent); }
      .hljs-string, .hljs-title, .hljs-name, .hljs-type, .hljs-attribute,
      .hljs-symbol, .hljs-bullet, .hljs-addition { color: var(--green); }
      .hljs-number, .hljs-regexp, .hljs-literal, .hljs-meta { color: var(--yellow); }
      .hljs-deletion { color: var(--red); }
      .hljs-built_in, .hljs-class .hljs-title { color: color-mix(in srgb, var(--accent) 72%, var(--fg)); }
      .hljs-variable, .hljs-template-variable, .hljs-params { color: var(--fg2); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
